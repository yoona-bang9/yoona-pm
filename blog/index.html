<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Blog — 방유나</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
  <style>
    :root{--white:#fff;--off:#f6f5f2;--ink:#0f0f0f;--mid:#5a5a5a;--soft:#a0a0a0;--line:#e6e6e6;--blue:#1540a0;--gutter:60px;--max-w:900px}
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Pretendard',-apple-system,sans-serif;background:var(--white);color:var(--ink);line-height:1.7}
    a{color:inherit;text-decoration:none}
    .wrap{max-width:var(--max-w);margin:0 auto;padding:48px var(--gutter)}
    .top{display:flex;justify-content:space-between;align-items:flex-end;gap:24px;padding-bottom:18px;border-bottom:1px solid var(--line)}
    h1{font-size:28px;letter-spacing:-0.03em}
    .sub{color:var(--mid);font-size:14px}
    .back{font-size:13px;color:var(--mid)}
    .list{margin-top:28px;display:flex;flex-direction:column;gap:10px}
    .card{border:1px solid var(--line);border-radius:8px;padding:18px;transition:background .2s}
    .card:hover{background:var(--off)}
    .meta{display:flex;gap:10px;align-items:center;color:var(--soft);font-size:12px;margin-bottom:6px}
    .tag{color:var(--blue);font-weight:700}
    .title{font-size:16px;font-weight:700;letter-spacing:-0.02em;margin-bottom:6px}
    .desc{color:var(--mid);font-size:13px}
    @media (max-width:900px){:root{--gutter:20px}}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="top">
      <div>
        <h1>Blog</h1>
        <p class="sub">PM 케이스/사고 과정을 기록합니다.</p>
      </div>
      <!-- ✅ project pages에서도 안전한 상대경로 -->
      <a class="back" href="../">← Portfolio</a>
    </div>

    <div class="list">
      <!-- ✅ /posts/... (절대경로) 금지, 상대경로로 -->
      <a class="card" href="./posts/2026-03-05-first.html">
        <div class="meta">
          <span>2026-03-05</span><span>·</span><span class="tag">Case Study</span>
        </div>
        <div class="title">[샘플] CTA 개선 프로젝트를 PM 관점으로 정리하는 법</div>
        <div class="desc">문제 → 가설 → 설계 → 결과 → 배운 점까지, 포트폴리오에 바로 넣는 글 구조.</div>
      </a>
    </div>
  </div>
</body>
</html>
